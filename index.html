<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价格配置</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a1f5e 0%, #0d1035 40%, #080c28 100%);
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 440px;
    backdrop-filter: blur(12px);
  }

  /* ── 顶部按钮行 ── */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .dropdown-wrap {
    flex: 1;
    position: relative;
  }

  .trigger {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: #e0e4ff;
    font-size: 13px;
    padding: 13px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: background 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .trigger:active { background: rgba(255,255,255,0.14); }
  .trigger.active {
    background: rgba(100,120,255,0.2);
    border-color: rgba(100,120,255,0.5);
  }

  .btn-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: center;
  }

  .arrow {
    font-size: 9px;
    flex-shrink: 0;
    transition: transform 0.25s;
    color: #8891cc;
  }
  .trigger.active .arrow { transform: rotate(180deg); }

  /* ── 下拉面板 ── */
  .menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: #161a4a;
    border: 1px solid rgba(100,120,255,0.35);
    border-radius: 14px;
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 10px 40px rgba(0,0,20,0.7);
    animation: fadeIn 0.18s ease;
    min-width: 160px;
    max-height: 72vh;
    overflow-y: auto;
    /* 防止滚动穿透 */
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  #wrap2 .menu {
    left: auto;
    right: 0;
    min-width: 230px;
  }
  .menu.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .menu-section {
    padding: 8px 14px 5px;
    font-size: 10px;
    color: #4a5490;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #111535;
    border-bottom: 1px solid rgba(100,120,255,0.12);
  }

  .menu-item {
    padding: 13px 14px;
    color: #c8cef5;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 8px;
    /* 关键：手机端用 touchend 响应，不用 hover */
    -webkit-tap-highlight-color: rgba(100,120,255,0.15);
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item.selected { color: #7b9cff; font-weight: 600; }

  .menu-item .m-icon {
    font-size: 12px;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }
  .fa-google { color: #5b8cff; }
  .fa-claude { color: #d97a4a; }
  .menu-item.selected .fa-google { color: #4e8cff; }
  .menu-item.selected .fa-claude { color: #f59060; }

  .item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .check {
    flex-shrink: 0;
    font-size: 10px;
    color: #5b8cff;
    opacity: 0;
  }
  .menu-item.selected .check { opacity: 1; }

  /* ── 信息块 ── */
  .info-block {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .info-block:last-child { margin-bottom: 0; }

  .info-label {
    font-size: 11px;
    color: #6b78b8;
    margin-bottom: 6px;
  }

  .info-val {
    font-size: 15px;
    color: #e0e4ff;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .billing-badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-top: 8px;
  }
  .badge-token { background: rgba(91,140,255,0.18); color: #7ba8ff; border: 1px solid rgba(91,140,255,0.3); }
  .badge-count { background: rgba(217,122,74,0.18); color: #f0a070; border: 1px solid rgba(217,122,74,0.3); }

  /* ── 价格列表 ── */
  .price-list { margin-top: 10px; }

  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .price-row:last-child { border-bottom: none; padding-bottom: 0; }
  .price-row-label { color: #6b78b8; }
  .price-row-val { color: #a0b8ff; font-weight: 600; font-variant-numeric: tabular-nums; }

  @keyframes pop {
    from { opacity: 0.1; transform: translateY(4px); }
    to   { opacity: 1;   transform: translateY(0); }
  }
  .updating { animation: pop 0.22s ease forwards; }

  .menu::-webkit-scrollbar { width: 3px; }
  .menu::-webkit-scrollbar-thumb { background: rgba(100,120,255,0.3); border-radius: 2px; }
  /* ── 价格解释板块 ── */
  .explain-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px;
    margin-top: 12px;
  }
  .explain-title {
    font-size: 11px;
    color: #6b78b8;
    margin-bottom: 14px;
    letter-spacing: 0.04em;
  }
  .explain-item {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .explain-item:last-child { margin-bottom: 0; }
  .explain-dot {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 5px;
  }
  .dot-input  { background: #5b8cff; box-shadow: 0 0 6px rgba(91,140,255,0.5); }
  .dot-output { background: #a06af0; box-shadow: 0 0 6px rgba(160,106,240,0.5); }
  .dot-cache  { background: #3ecfaa; box-shadow: 0 0 6px rgba(62,207,170,0.5); }
  .dot-cache2 { background: #f0a050; box-shadow: 0 0 6px rgba(240,160,80,0.5); }
  .explain-term {
    font-size: 13px;
    font-weight: 600;
    color: #c8d0f5;
    margin-bottom: 3px;
  }
  .explain-desc {
    font-size: 12px;
    color: #5a6599;
    line-height: 1.6;
  }


  /* ── 价格对比模块 ── */
  .compare-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px;
    margin-top: 12px;
  }
  .compare-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .compare-header-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(91,140,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #5b8cff;
  }
  .compare-header-title {
    font-size: 13px;
    font-weight: 600;
    color: #c8d0f5;
    flex: 1;
  }
  .compare-subtitle {
    font-size: 11px;
    color: #4a5490;
    margin-bottom: 14px;
    margin-left: 36px;
  }

  /* 标签切换 */
  .compare-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .compare-tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.1);
    color: #6b78b8;
    background: transparent;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .compare-tab.active {
    background: rgba(91,140,255,0.18);
    border-color: rgba(91,140,255,0.4);
    color: #8bb0ff;
  }
  .compare-tab i { font-size: 10px; }

  /* 对比行 */
  .compare-list { display: flex; flex-direction: column; gap: 10px; }

  .compare-row {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 11px;
    padding: 11px 13px;
    position: relative;
    overflow: hidden;
  }
  .compare-row.cheapest {
    border-color: rgba(62,207,120,0.3);
    background: rgba(62,207,120,0.05);
  }
  .compare-row.priciest {
    border-color: rgba(240,100,80,0.2);
    background: rgba(240,100,80,0.04);
  }

  .compare-row-top {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 8px;
  }
  .compare-row-icon { font-size: 11px; flex-shrink: 0; }
  .compare-row-name {
    font-size: 12px;
    color: #b0bcf0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .compare-tag {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .tag-cheap { background: rgba(62,207,120,0.2); color: #3ecf78; }
  .tag-pricey { background: rgba(240,100,80,0.2); color: #f06450; }

  .compare-price-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .compare-price-label {
    font-size: 10px;
    color: #4a5490;
    width: 62px;
    flex-shrink: 0;
  }
  .compare-bar-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .compare-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .bar-input  { background: linear-gradient(90deg, #3a6fff, #5b8cff); }
  .bar-output { background: linear-gradient(90deg, #7a40e0, #a06af0); }
  .bar-cache  { background: linear-gradient(90deg, #1faf7a, #3ecfaa); }
  .compare-price-val {
    font-size: 10px;
    color: #7b9cff;
    font-weight: 600;
    width: 42px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .compare-empty {
    text-align: center;
    color: #4a5490;
    font-size: 12px;
    padding: 20px 0;
  }

  .compare-billing-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 3px;
  }
  .compare-billing-tab {
    flex: 1;
    text-align: center;
    padding: 7px 0;
    font-size: 12px;
    font-weight: 600;
    color: #4a5490;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .compare-billing-tab i { font-size: 10px; }
  .compare-billing-tab.active {
    background: rgba(91,140,255,0.2);
    color: #8bb0ff;
  }

  /* ── 搜索框 ── */
  .menu-search-wrap {
    padding: 10px 10px 6px;
    background: #161a4a;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid rgba(100,120,255,0.15);
  }
  .menu-search {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(100,120,255,0.25);
    border-radius: 8px;
    color: #e0e4ff;
    font-size: 13px;
    padding: 7px 10px 7px 30px;
    outline: none;
    box-sizing: border-box;
    font-family: inherit;
  }
  .menu-search::placeholder { color: #4a5490; }
  .menu-search:focus { border-color: rgba(100,120,255,0.5); background: rgba(255,255,255,0.1); }
  .menu-search-icon {
    position: absolute;
    left: 19px;
    top: 50%;
    transform: translateY(-50%);
    color: #4a5490;
    font-size: 11px;
    pointer-events: none;
  }
  .menu-search-wrap-inner {
    position: relative;
    display: flex;
    align-items: center;
  }
  /* 搜索时隐藏 section 标题（如果其下所有 item 都被隐藏就藏起来） */
  .menu-section.hidden { display: none; }
  .menu-item.hidden { display: none; }
  .menu-no-result {
    padding: 16px;
    text-align: center;
    color: #4a5490;
    font-size: 12px;
  }

  /* ── 模型 PK 对比模块 ── */
  .duel-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 16px;
    margin-top: 12px;
  }
  .duel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .duel-header-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(160,106,240,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #a06af0;
  }
  .duel-header-title {
    font-size: 13px;
    font-weight: 600;
    color: #c8d0f5;
  }
  .duel-subtitle {
    font-size: 11px;
    color: #4a5490;
    margin: 4px 0 14px 36px;
  }

  /* 计费切换 */
  .duel-billing-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 3px;
  }
  .duel-billing-tab {
    flex: 1;
    text-align: center;
    padding: 7px 0;
    font-size: 12px;
    font-weight: 600;
    color: #4a5490;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .duel-billing-tab i { font-size: 10px; }
  .duel-billing-tab.active { background: rgba(160,106,240,0.2); color: #c080ff; }

  /* 两个选择器 + VS 布局 */
  .duel-selectors {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .duel-select-wrap { flex: 1; position: relative; }
  .duel-select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: #c8cef5;
    font-size: 12px;
    padding: 10px 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    overflow: hidden;
  }
  .duel-select.active {
    background: rgba(160,106,240,0.15);
    border-color: rgba(160,106,240,0.4);
  }
  .duel-select-dot {
    width: 9px; height: 9px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .duel-select-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }
  .duel-select-arrow { font-size: 9px; color: #4a5490; flex-shrink: 0; }

  .duel-vs {
    font-size: 11px;
    font-weight: 800;
    color: #a06af0;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* 下拉列表 */
  .duel-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: #161a4a;
    border: 1px solid rgba(160,106,240,0.35);
    border-radius: 12px;
    overflow: hidden;
    z-index: 300;
    box-shadow: 0 8px 28px rgba(0,0,20,0.65);
    animation: fadeIn 0.15s ease;
    max-height: 55vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    min-width: 180px;
  }
  .duel-dropdown.right { left: auto; right: 0; }
  .duel-dropdown.show { display: block; }
  .duel-dd-section {
    padding: 6px 12px 4px;
    font-size: 10px;
    color: #4a5490;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(160,106,240,0.1);
  }
  .duel-dd-item {
    padding: 11px 12px;
    font-size: 12px;
    color: #c8cef5;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    gap: 7px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  .duel-dd-item:last-child { border-bottom: none; }
  .duel-dd-item:active { background: rgba(160,106,240,0.18); }
  .duel-dd-item.selected { color: #c080ff; font-weight: 600; }
  .duel-dd-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .duel-dd-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 对比结果表格 */
  .duel-result { margin-top: 4px; }
  .duel-result-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .duel-col-label {
    font-size: 10px;
    color: #4a5490;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .duel-col-label.metric { text-align: left; }
  .duel-result-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .duel-metric {
    font-size: 11px;
    color: #6b78b8;
    padding-left: 2px;
  }
  .duel-val {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: #a0b8ff;
    background: rgba(255,255,255,0.04);
    border-radius: 7px;
    padding: 7px 4px;
    border: 1px solid rgba(255,255,255,0.06);
    font-variant-numeric: tabular-nums;
    position: relative;
    overflow: hidden;
  }
  .duel-val.winner {
    background: rgba(62,207,120,0.1);
    border-color: rgba(62,207,120,0.3);
    color: #3ecf78;
  }
  .duel-val.loser {
    background: rgba(240,100,80,0.06);
    border-color: rgba(240,100,80,0.15);
    color: #8899aa;
  }
  .duel-val-text { position: relative; z-index: 1; }
  .duel-empty {
    text-align: center;
    color: #4a5490;
    font-size: 12px;
    padding: 20px 0;
  }
  .duel-na { color: #4a5490; font-size: 11px; font-weight: 400; }

</style>
</head>
<body>
<div class="card">

  <!-- 站点标题 -->
  <div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.07)">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#3a6fff,#a06af0);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(91,140,255,0.35)">
        <i class="fa-solid fa-dollar-sign" style="color:#fff;font-size:15px"></i>
      </div>
      <div>
        <div style="font-size:18px;font-weight:800;color:#e0e4ff;letter-spacing:-0.01em;line-height:1.2">10dian-ai</div>
        <div style="font-size:11px;color:#5a6599;margin-top:2px;letter-spacing:0.06em;text-transform:uppercase">价格对比站</div>
